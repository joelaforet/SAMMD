[workspace]
name = "sammd"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
click = ">=8.1"
pydantic = ">=2"
pyyaml = ">=6"

[pypi-dependencies]
sammd = { path = ".", editable = true }

[feature.dev.dependencies]
coverage = ">=7"
pytest = ">=8"
pytest-cov = ">=5"
ruff = ">=0.8"

[feature.docs.dependencies]
sphinx = ">=8"
myst-parser = ">=4"

[feature.science.dependencies]
# Keep OpenMM's NVRTC/PTX target no newer than the local NVIDIA driver-supported CUDA line.
cuda-version = "13.0.*"
openmm = "*"
rdkit = "*"
mbuild = "*"
openff-toolkit = "*"
openff-interchange = "*"
packmol = "*"
ipykernel = "*"

[environments]
default = ["dev"]
dev = ["dev"]
docs = ["dev", "docs"]
science = ["dev", "science"]

[tasks]
test = "python -m pytest --cov=sammd --cov-report=term-missing"
lint = "ruff check src/sammd tests tools"
real-system-smoke = "python tools/openmm_smoke.py --output-dir outputs/openmm_smoke/pd111_propanethiol_cinnamaldehyde --overwrite"
install-science-kernel = "python -m ipykernel install --user --name sammd-science --display-name 'Python (SAMMD science)'"
