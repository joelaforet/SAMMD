[workspace]
name = "sammd"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
click = ">=8.1"
pydantic = ">=2"
pyyaml = ">=6"

[pypi-dependencies]
sammd = { path = ".", editable = true }

[feature.dev.dependencies]
coverage = ">=7"
pytest = ">=8"
pytest-cov = ">=5"
ruff = ">=0.8"

[feature.docs.dependencies]
sphinx = ">=8"
myst-parser = ">=4"

[feature.science.dependencies]
openmm = "*"
rdkit = "*"
mbuild = "*"
openff-toolkit = "*"
openff-interchange = "*"
packmol = "*"

[environments]
default = ["dev"]
dev = ["dev"]
docs = ["dev", "docs"]
science = ["dev", "science"]

[tasks]
test = "python -m pytest --cov=sammd --cov-report=term-missing"
lint = "ruff check src/sammd tests"
