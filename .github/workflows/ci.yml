name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 0 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          environments: default
          cache: true

      - name: Check scientific dependencies
        run: |
          pixi run python -c "import openff.toolkit, openff.interchange, rdkit"
          pixi run bash -lc "command -v packmol"

      - name: Lint
        run: pixi run lint

      - name: Test with coverage
        run: pixi run test

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build docs
        run: python -m sphinx -W -b html docs/source docs/build/html
